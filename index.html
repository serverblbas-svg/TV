<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یاریزانی IPTV ی مۆدێرن</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #16161e;
            --bg-card: #1e1e28;
            --bg-hover: #252533;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --text-primary: #ffffff;
            --text-secondary: #b2b2c0;
            --border: #2d2d3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Container - Two Columns */
        .sidebar {
            width: 400px;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: row; /* دوو ستوون لە تەنیشت یەکتر */
            z-index: 10;
        }

        /* Right Column: Groups */
        .groups-pane {
            width: 35%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }

        /* Left Column: Channels */
        .channels-pane {
            width: 65%;
            display: flex;
            flex-direction: column;
        }

        .pane-header {
            padding: 15px;
            font-weight: 800;
            font-size: 1rem;
            color: var(--accent-light);
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .groups-list, .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Group Item Styling */
        .group-item {
            padding: 12px 15px;
            margin-bottom: 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .group-item.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        .group-count {
            font-size: 0.75rem;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 12px;
        }

        /* Search Box in Channels Pane */
        .search-container {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            outline: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
        }

        /* Channel Item Styling */
        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .channel-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            transform: translateX(-3px);
        }

        .channel-item.active {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.2), rgba(108, 92, 231, 0.05));
            border-color: var(--accent);
        }

        .channel-logo-wrapper {
            width: 45px;
            height: 45px;
            min-width: 45px;
            border-radius: 10px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            margin-left: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .channel-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .channel-info {
            flex: 1;
            overflow: hidden;
        }

        .channel-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .channel-group-badge {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent-light);
            background: rgba(108, 92, 231, 0.15);
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .channel-item.active .channel-group-badge {
            background: var(--accent);
            color: #fff;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            overflow-y: auto;
            gap: 20px;
        }

        .player-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .epg-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            flex: 1;
        }

        .epg-header {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .epg-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .epg-item:last-child { border-bottom: none; }

        .epg-time {
            color: var(--accent);
            font-weight: 800;
            font-size: 0.9rem;
            min-width: 90px;
            background: rgba(108, 92, 231, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
        }

        .epg-title {
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
            color: #ff7675;
            padding: 20px;
            border-radius: 12px;
            margin: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: 50vh; 
                border-left: none; 
                border-top: 1px solid var(--border);
                order: 2;
            }
            .main-content { 
                height: 50vh; 
                padding: 15px; 
                order: 1; 
            }
            .groups-pane { width: 40%; }
            .channels-pane { width: 60%; }
        }

        @media (max-width: 600px) {
            .sidebar { flex-direction: column; height: 60vh; }
            .groups-pane { 
                width: 100%; 
                height: 35%; 
                border-left: none; 
                border-bottom: 1px solid var(--border); 
            }
            .channels-pane { width: 100%; height: 65%; }
            .groups-list { display: flex; overflow-x: auto; gap: 8px; padding: 10px; }
            .group-item { margin-bottom: 0; white-space: nowrap; min-width: fit-content; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <!-- ستوونی یەکەم: گرووپەکان -->
        <div class="groups-pane">
            <div class="pane-header">📁 گرووپەکان</div>
            <div class="groups-list" id="groupsList">
                <div class="loading">چاوەڕوان بە...</div>
            </div>
        </div>

        <!-- ستوونی دووەم: کەناڵەکان -->
        <div class="channels-pane">
            <div class="search-container">
                <input type="text" class="search-box" id="searchInput" placeholder="گەڕان لەم گرووپە...">
            </div>
            <div class="channels-list" id="channelList">
                <div class="empty-state">تکایە گرووپێک هەڵبژێرە</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="player-container">
            <video id="videoPlayer" controls autoplay playsinline></video>
        </div>
        
        <div class="epg-container">
            <div class="epg-header">
                <span>📅</span>
                <span>بەرنامەی ڕۆژانە (EPG)</span>
            </div>
            <div id="epgContent">
                <div class="empty-state">تکایە کەناڵێک پەخش بکە بۆ بینینی بەرنامەکان</div>
            </div>
        </div>
    </div>

    <script>
        const M3U_URL = 'https://xtream-ie.net/get.php?username=aVsFwGCMJJ1&password=qaxP3soxB&type=m3u_plus';
        const EPG_URL = 'https://xtream-ie.net/xmltv.php?username=aVsFwGCMJJ1&password=qaxP3soxB';

        const video = document.getElementById('videoPlayer');
        const groupsList = document.getElementById('groupsList');
        const channelList = document.getElementById('channelList');
        const searchInput = document.getElementById('searchInput');
        const epgContent = document.getElementById('epgContent');
        
        let allChannels = [];
        let uniqueGroups = [];
        let activeGroup = 'هەمووی';
        let hls = null;

        // شیکردنەوەی M3U
        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/i) || line.match(/logo="([^"]*)"/i);
                    const groupMatch = line.match(/group-title="([^"]*)"/i);
                    const nameMatch = line.match(/,(.*)$/);
                    
                    currentChannel = {
                        logo: logoMatch && logoMatch[1] ? logoMatch[1].trim() : '',
                        group: groupMatch && groupMatch[1] ? groupMatch[1].trim() : 'گشتی',
                        name: nameMatch && nameMatch[1] ? nameMatch[1].trim() : 'کەناڵی بێ ناو'
                    };
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }
            return channels;
        }

        // دەرهێنانی گرووپە تاکەکان
        function extractGroups(channels) {
            const groups = new Set();
            groups.add('هەمووی');
            channels.forEach(ch => groups.add(ch.group));
            return Array.from(groups).sort();
        }

        // ژماردنی کەناڵەکان بۆ هەر گرووپێک
        function countChannelsPerGroup(channels) {
            const counts = {};
            channels.forEach(ch => {
                counts[ch.group] = (counts[ch.group] || 0) + 1;
            });
            counts['هەمووی'] = channels.length;
            return counts;
        }

        async function loadData() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error('هەڵە لە پەیوەندی');
                const data = await response.text();
                
                allChannels = parseM3U(data);
                uniqueGroups = extractGroups(allChannels);
                const groupCounts = countChannelsPerGroup(allChannels);

                renderGroups(groupCounts);
                selectGroup('هەمووی'); // بارکردنی هەموو کەناڵەکان بە شێوەی بنەڕەت

            } catch (error) {
                groupsList.innerHTML = `
                    <div class="error-msg">
                        <strong>⚠️ هەڵە لە بارکردنی داتا</strong><br>
                        <small>ڕەنگە کێشەی CORS هەبێت. تکایە دڵنیابەرەوە ڕێگەپێدانت هەیە یان پرۆکسی بەکاربهێنە.</small>
                    </div>
                `;
                console.error('Error:', error);
            }
        }

        function renderGroups(counts) {
            groupsList.innerHTML = '';
            uniqueGroups.forEach(group => {
                const div = document.createElement('div');
                div.className = 'group-item';
                div.dataset.group = group;
                div.innerHTML = `
                    <span>${group}</span>
                    <span class="group-count">${counts[group] || 0}</span>
                `;
                div.addEventListener('click', () => selectGroup(group));
                groupsList.appendChild(div);
            });
        }

        function selectGroup(group) {
            activeGroup = group;
            // نوێکردنەوەی دیزاینی گرووپە چالاکەکە
            document.querySelectorAll('.group-item').forEach(el => {
                el.classList.toggle('active', el.dataset.group === group);
            });
            
            // پاککردنەوەی گەڕان
            searchInput.value = '';
            renderChannels(allChannels.filter(ch => group === 'هەمووی' || ch.group === group));
        }

        function renderChannels(channels) {
            channelList.innerHTML = '';
            if (channels.length === 0) {
                channelList.innerHTML = '<div class="empty-state">هیچ کەناڵێک نەدۆزرایەوە</div>';
                return;
            }

            channels.forEach((channel, index) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                const logoSrc = channel.logo || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%236c5ce7"/><text x="50" y="55" font-size="40" fill="white" text-anchor="middle" font-family="Arial">TV</text></svg>';
                
                div.innerHTML = `
                    <div class="channel-logo-wrapper">
                        <img src="${logoSrc}" class="channel-logo" alt="logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%236c5ce7\'/><text x=\'50\' y=\'55\' font-size=\'40\' fill=\'white\' text-anchor=\'middle\' font-family=\'Arial\'>TV</text></svg>'">
                    </div>
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                        <div class="channel-group-badge">${channel.group}</div>
                    </div>
                `;
                
                div.addEventListener('click', () => {
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    playChannel(channel);
                });
                
                channelList.appendChild(div);
            });
        }

        function playChannel(channel) {
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log('Auto-play prevented')));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
            
            loadEPG(channel.name, channel.group);
        }

        function loadEPG(channelName, groupName) {
            epgContent.innerHTML = `
                <div class="epg-item">
                    <span class="epg-time">ئێستا</span>
                    <span class="epg-title">پەخشی ڕاستەوخۆ: ${channelName}</span>
                </div>
                <div class="epg-item">
                    <span class="epg-time">داهاتوو</span>
                    <span class="epg-title">بەرنامەی داهاتوو (${groupName})</span>
                </div>
            `;
        }

        // گەڕان تەنها لەناو گرووپی هەڵبژێردراو
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const groupChannels = activeGroup === 'هەمووی' 
                ? allChannels 
                : allChannels.filter(ch => ch.group === activeGroup);
                
            const filtered = groupChannels.filter(ch => 
                ch.name.toLowerCase().includes(query)
            );
            renderChannels(filtered);
        });

        loadData();
    </script>
</body>
</html>
